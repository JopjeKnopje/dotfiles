- defaults:
    link:
      relink: true

- create:
    - ~/.local/bin/
    - ~/.config/k9s/

- clean: ['~']

- link:
    ~/:
      path: bash/.*
      glob: true
    ~/.local/bin:
      path: bin/*
      glob: true
    ~/.config/i3: i3
    ~/.config/k9s/:
      glob: true
      path: k9s/*
    ~/.config/lazygit: lazygit
    ~/.config/nvim: nvim
    ~/.config/rofi: rofi
    ~/.config/terminator: terminator
    ~/.config/tms: tms
    ~/.config/tmux: tmux
    ~/scripts: scripts
    ~/.Xresources: X11/.Xresources
    ~/.gitconfig: git/.gitconfig
    ~/:
      relink: True
      glob: true
      path: zsh/*
      path: zsh/.*


- shell:
  - [git submodule update --init --recursive, Installing submodules]
